<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ 表情包分享 - 在线预览与下载</title>
    <meta name="description" content="在线预览和批量下载QQ表情包，支持动图/静图检测，一键打包下载">
    <meta name="keywords" content="QQ表情包,表情下载,动图,GIF,表情分享">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-inner">
                <div class="brand">
                    <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                    </svg>
                    <h1 class="brand-title">QQ 表情包分享</h1>
                </div>
                <a href="https://github.com" target="_blank" class="github-link" title="GitHub">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                </a>
            </div>
        </header>

        <!-- Input Section -->
        <section class="input-section" id="input-section">
            <div class="input-card">
                <div class="input-card-glow"></div>
                <h2 class="input-title">粘贴表情包链接或输入 ID</h2>
                <p class="input-desc">支持 QQ 表情商城链接 或 直接输入表情包 ID</p>
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                        <input type="text" id="sticker-input" class="sticker-input" 
                               placeholder="粘贴链接或输入表情包ID，如 241071" 
                               autocomplete="off" spellcheck="false">
                        <button id="clear-btn" class="clear-btn" title="清除" style="display:none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <button id="fetch-btn" class="fetch-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <span>获取表情</span>
                    </button>
                </div>
                <div class="quick-tips">
                    <span class="tip-label">示例：</span>
                    <button class="tip-item" data-id="241071">241071</button>
                    <button class="tip-item" data-id="241487">241487</button>
                    <button class="tip-item" data-id="207978">207978</button>
                </div>
            </div>
        </section>

        <!-- Loading -->
        <div class="loading-overlay" id="loading" style="display:none;">
            <div class="loading-spinner">
                <div class="spinner-ring"></div>
                <p class="loading-text">正在获取表情包数据...</p>
            </div>
        </div>

        <!-- Error -->
        <div class="error-toast" id="error-toast" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <span id="error-msg"></span>
        </div>

        <!-- Result Section -->
        <section class="result-section" id="result-section" style="display:none;">
            <!-- Sticker Info Header -->
            <div class="sticker-header" id="sticker-header">
                <img id="sticker-cover" class="sticker-cover" src="" alt="封面">
                <div class="sticker-meta">
                    <h2 id="sticker-name" class="sticker-name"></h2>
                    <div class="sticker-tags">
                        <span class="tag" id="sticker-count"></span>
                        <span class="tag" id="sticker-update"></span>
                    </div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar" id="toolbar">
                <div class="toolbar-left">
                    <label class="select-all-label" id="select-all-label">
                        <input type="checkbox" id="select-all-cb">
                        <span>全选</span>
                    </label>
                    <span class="selected-count" id="selected-count">已选 0 张</span>
                </div>
                <div class="toolbar-right">
                    <div class="view-toggle">
                        <button class="view-btn active" id="view-grid" title="网格视图">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                                <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                            </svg>
                        </button>
                        <button class="view-btn" id="view-list" title="列表视图">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                                <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
                                <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <button class="download-btn" id="download-gif-btn" title="下载选中的动图(GIF)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>下载动图 GIF</span>
                    </button>
                    <button class="download-btn download-btn-secondary" id="download-png-btn" title="下载选中的静图(PNG)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>下载静图 PNG</span>
                    </button>
                </div>
            </div>

            <!-- Download Progress -->
            <div class="download-progress" id="download-progress" style="display:none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="progress-text" id="progress-text">0%</span>
            </div>

            <!-- Sticker Grid -->
            <div class="sticker-grid" id="sticker-grid"></div>
        </section>

        <!-- Share Section -->
        <section class="share-section" id="share-section" style="display:none;">
            <div class="share-card">
                <h3>分享链接</h3>
                <div class="share-link-group">
                    <input type="text" id="share-link" class="share-link-input" readonly>
                    <button id="copy-share-btn" class="copy-share-btn">复制</button>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>QQ Sticker Viewer &mdash; 仅供学习交流使用</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
